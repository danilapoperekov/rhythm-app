services:
  - type: web
    name: rhythm-ai
    runtime: node
    buildCommand: npm install --omit=dev
    startCommand: node server.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: RHYTHM_ACCESS_TOKEN
        sync: false
      - key: RHYTHM_ALLOWED_ORIGINS
        value: https://danilapoperekov.github.io
